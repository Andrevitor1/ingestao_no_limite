name: Avaliador de Submissoes

on:
  pull_request:
    paths:
      - 'submissions/*.json'
    branches: [ main ]

# Fila única: uma submissão por vez. cancel-in-progress=false enfileira em vez de cancelar.
# O passo final de cooldown mantém o slot ocupado, garantindo o intervalo entre avaliações.
concurrency:
  group: avaliador-ingestao
  cancel-in-progress: false

jobs:
  avaliar:
    runs-on: self-hosted
    env:
      PR_NUMERO: ${{ github.event.pull_request.number }}
      GITHUB_RUN_ID: ${{ github.run_id }}
      GITHUB_RUN_ATTEMPT: ${{ github.run_attempt }}
      # Intervalo de cortesia entre submissões (segundos). Padrão: 15 min.
      COOLDOWN_SEC: ${{ vars.COOLDOWN_SEC || '900' }}
    steps:
      - name: Checkout do PR
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Identificar arquivos alterados
        id: changed-files
        uses: tj-actions/changed-files@v45
        with:
          files: submissions/*.json

      - name: Executar Avaliacao Oficial no Servidor
        run: |
          set -eo pipefail

          CHANGED_FILE="${{ steps.changed-files.outputs.all_changed_files }}"
          CHANGED_FILE=$(echo "$CHANGED_FILE" | awk '{print $1}')

          if [ -z "$CHANGED_FILE" ]; then
            echo "❌ Nenhum arquivo JSON de submissao encontrado nas alteracoes do PR."
            exit 1
          fi

          _LOG_SLUG="$(basename "$CHANGED_FILE" .json)"
          [ -n "${PR_NUMERO:-}" ] && _LOG_SLUG="${_LOG_SLUG}_pr${PR_NUMERO}"
          [ -n "${GITHUB_RUN_ID:-}" ] && _LOG_SLUG="${_LOG_SLUG}_run${GITHUB_RUN_ID}"

          # shellcheck disable=SC1091
          source evaluator/scripts/lib/log-run.sh
          log_run_init workflow "$_LOG_SLUG"
          trap 'log_run_finish $?' EXIT

          echo "================================================="
          echo "--> Arquivo de submissao detectado: $CHANGED_FILE"
          echo "--> PR: ${PR_NUMERO:-n/a} | Run: ${GITHUB_RUN_ID:-n/a}"
          echo "================================================="

          chmod +x evaluator/evaluator.sh
          ./evaluator/evaluator.sh "$CHANGED_FILE"

      - name: Intervalo de cortesia (fairness)
        if: always()
        run: |
          set -eo pipefail
          COOLDOWN="${COOLDOWN_SEC:-900}"
          echo "================================================="
          echo "--> Aguardando ${COOLDOWN}s antes de liberar a fila para a próxima submissão."
          echo "================================================="
          sleep "$COOLDOWN"
